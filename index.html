<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Emoji成语大冒险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a1a;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;
  user-select:none;overflow-x:hidden}
.container{width:100%;max-width:420px}

/* 战斗场景 */
.battle-scene{position:relative;width:100%;height:280px;border-radius:20px;overflow:hidden;
  margin-bottom:10px;border:2px solid rgba(255,255,255,.1)}
.scene-bg{position:absolute;inset:0;transition:background .5s}
.scene-bg.grass{background:linear-gradient(180deg,#4a9c3f 0%,#2d6b28 40%,#1a4a18 100%)}
.scene-bg.cave{background:linear-gradient(180deg,#3a3040 0%,#1a1020 40%,#0a0515 100%)}
.scene-bg.lava{background:linear-gradient(180deg,#8b2500 0%,#4a1000 40%,#1a0500 100%)}
.scene-bg.castle{background:linear-gradient(180deg,#2a2040 0%,#15102a 40%,#0a0520 100%)}

/* 地面 */
.ground{position:absolute;bottom:0;width:100%;height:60px;
  background:linear-gradient(180deg,rgba(0,0,0,.3),rgba(0,0,0,.6));border-top:3px solid rgba(255,255,255,.05)}

/* 怪物 */
.monster{position:absolute;right:30px;top:50px;text-align:center;transition:transform .3s;z-index:2}
.monster .sprite{font-size:80px;display:block;filter:drop-shadow(0 8px 16px rgba(0,0,0,.5))}
.monster .name-tag{background:rgba(0,0,0,.7);color:#fff;padding:2px 10px;border-radius:10px;
  font-size:12px;font-weight:600;margin-top:2px;display:inline-block}
.monster .hp-bar-wrap{width:100px;height:6px;background:rgba(0,0,0,.4);border-radius:3px;margin:4px auto 0;overflow:hidden}
.monster .hp-bar{height:100%;background:#51cf66;border-radius:3px;transition:width .4s}
.monster.hit{animation:monsterHit .3s ease}
.monster.defeated{animation:monsterDefeat .6s ease forwards}
@keyframes monsterHit{0%,100%{transform:translateX(0)}25%{transform:translateX(-15px)}75%{transform:translateX(15px)}}
@keyframes monsterDefeat{0%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.1)}100%{opacity:0;transform:scale(.5) translateY(50px)}}

/* 勇者 */
.player{position:absolute;left:20px;bottom:60px;text-align:center;transition:transform .3s;z-index:2}
.player .sprite{font-size:70px;display:block;filter:drop-shadow(0 6px 12px rgba(0,0,0,.5))}
.player .name-tag{background:rgba(0,0,0,.7);color:#ffd700;padding:2px 10px;border-radius:10px;
  font-size:12px;font-weight:600;margin-top:2px;display:inline-block}
.player .hp-bar-wrap{width:100px;height:6px;background:rgba(0,0,0,.4);border-radius:3px;margin:4px auto 0;overflow:hidden}
.player .hp-bar{height:100%;background:linear-gradient(90deg,#ff6b6b,#ffd700);border-radius:3px;transition:width .4s}
.player.attack{animation:playerAttack .4s ease}
.player.hit{animation:playerHit .3s ease}
@keyframes playerAttack{0%{transform:translateX(0)}50%{transform:translateX(80px)}100%{transform:translateX(0)}}
@keyframes playerHit{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* 伤害数字 */
.dmg-num{position:absolute;font-size:32px;font-weight:900;color:#ff4757;z-index:10;pointer-events:none;
  text-shadow:0 0 10px rgba(255,71,87,.8);animation:dmgFly .8s ease forwards}
@keyframes dmgFly{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

/* 关卡提示 */
.level-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#ffd700;font-size:22px;font-weight:800;text-shadow:0 0 20px rgba(255,215,0,.8);
  pointer-events:none;z-index:5;opacity:0;transition:all .3s}
.level-banner.show{opacity:1;animation:bannerIn .8s ease forwards}
@keyframes bannerIn{0%{opacity:0;transform:translate(-50%,-50%) scale(2)}30%{opacity:1;transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0}}

/* 下方UI */
.game-ui{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:14px;backdrop-filter:blur(10px)}
.ui-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ui-header .level-text{color:rgba(255,255,255,.5);font-size:12px}
.ui-header .score-text{color:#ffd700;font-size:13px;font-weight:600}
.ui-header .boss-tag{background:#ff4757;color:#fff;font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700}
.emoji-display{text-align:center;font-size:42px;letter-spacing:6px;padding:8px 0;color:#fff}
.hint-display{text-align:center;font-size:12px;color:rgba(255,255,255,.3);min-height:16px}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.option-btn{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);
  border-radius:12px;padding:13px 10px;font-size:15px;font-weight:600;color:#ccc;
  cursor:pointer;transition:all .15s;letter-spacing:1px;position:relative}
.option-btn:active{transform:scale(.95)}
.option-btn.correct{background:rgba(81,207,102,.25);border-color:#51cf66;color:#51cf66}
.option-btn.wrong{background:rgba(255,71,87,.25);border-color:#ff4757;color:#ff4757}
.actions{display:flex;gap:8px}
.tip-btn{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  color:rgba(255,255,255,.5);border-radius:10px;padding:10px;font-size:12px;cursor:pointer}
.tip-btn:disabled{opacity:.25;pointer-events:none}

/* 开始画面 */
.start-screen{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;
  display:flex;align-items:center;justify-content:center}
.start-card{background:#1a1a2e;border:2px solid rgba(255,255,255,.1);border-radius:24px;
  padding:40px 28px;text-align:center;width:90%;max-width:380px;color:#fff}
.start-card h1{font-size:28px;margin-bottom:4px}
.start-card .sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:20px}
.start-card input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.05);color:#fff;font-size:16px;text-align:center;outline:none;margin-bottom:12px}
.start-card input:focus{border-color:#ffd700}
.start-card .rank-preview{font-size:12px;color:rgba(255,255,255,.3);margin-bottom:14px}
.start-card button{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;
  border-radius:14px;padding:14px;font-size:17px;font-weight:700;cursor:pointer;width:100%}

/* 结果画面 */
.result-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;
  align-items:center;justify-content:center}
.result-overlay.show{display:flex}
.result-card{background:#1a1a2e;border:2px solid rgba(255,255,255,.1);border-radius:24px;
  padding:32px 24px;text-align:center;width:90%;max-width:380px;color:#fff;max-height:90vh;overflow-y:auto}
.result-card .end-emoji{font-size:56px;margin-bottom:4px}
.result-card h2{font-size:22px;margin-bottom:2px;color:#ffd700}
.result-card .final-score{font-size:36px;font-weight:800;
  background:linear-gradient(135deg,#ffd700,#ff8e53);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;margin:4px 0}
.result-card .detail{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:12px}
.result-card .detail span{color:rgba(255,255,255,.7)}

/* 排行榜 */
.rank-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.rank-table th{color:rgba(255,255,255,.4);padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.1)}
.rank-table td{color:rgba(255,255,255,.7);padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.05)}
.rank-table .me td{color:#ffd700;font-weight:700}
.rank-table .rank-num{color:rgba(255,255,255,.3)}
.rank-table .rank-num.gold{color:#ffd700;font-size:18px}
.rank-table .rank-num.silver{color:#c0c0c0;font-size:16px}
.rank-table .rank-num.bronze{color:#cd7f32;font-size:14px}

.result-card .btns{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.result-card .share-btn{background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;border:none;border-radius:12px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%}
.result-card .restart-btn{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);
  border:none;border-radius:12px;padding:10px;font-size:13px;cursor:pointer;width:100%}
</style>
</head>
<body>
<div class="container">
  <!-- 战斗场景 -->
  <div class="battle-scene" id="battleScene">
    <div class="scene-bg grass" id="sceneBg"></div>
    <div class="ground"></div>
    <div class="monster" id="monster">
      <span class="sprite" id="monsterSprite">🐺</span>
      <span class="name-tag" id="monsterName">野狼</span>
      <div class="hp-bar-wrap"><div class="hp-bar" id="monsterHpBar" style="width:100%"></div></div>
    </div>
    <div class="player" id="playerEl">
      <span class="sprite">⚔️</span>
      <span class="name-tag" id="playerName">勇者</span>
      <div class="hp-bar-wrap"><div class="hp-bar" id="playerHpBar" style="width:100%"></div></div>
    </div>
    <div class="level-banner" id="levelBanner"></div>
  </div>

  <!-- 游戏UI -->
  <div class="game-ui" id="gameUi" style="display:none">
    <div class="ui-header">
      <span class="level-text" id="levelText">第 1 关</span>
      <span class="boss-tag" id="bossTag" style="display:none">BOSS</span>
      <span class="score-text" id="scoreText">0分</span>
    </div>
    <div class="emoji-display" id="emojiDisplay"></div>
    <div class="hint-display" id="hintDisplay"></div>
    <div class="options" id="options"></div>
    <div class="actions">
      <button class="tip-btn" id="tipBtn" onclick="useTip()">💡提示 -5</button>
      <button class="tip-btn" id="skipBtn" onclick="skipQuestion()">⏭跳过</button>
    </div>
  </div>
</div>

<!-- 开始画面 -->
<div class="start-screen" id="startScreen">
  <div class="start-card">
    <h1>🎭 Emoji成语大冒险</h1>
    <div class="sub">猜对成语攻击怪物，一路闯关到底！</div>
    <input type="text" id="nameInput" placeholder="输入你的勇者名" maxlength="8">
    <div class="rank-preview" id="rankPreview"></div>
    <button onclick="startGame()">⚔️ 出发冒险</button>
  </div>
</div>

<!-- 结果画面 -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card" id="resultCard"></div>
</div>

<script>
// ========== 音效系统 ==========
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playTone(freq,dur,type='square',vol=.15){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxAttack(){playTone(600,.08,'square',.12);setTimeout(()=>playTone(900,.1,'square',.1),60)}
function sfxHit(){playTone(120,.2,'sawtooth',.15)}
function sfxBoss(){playTone(80,.4,'sawtooth',.2);setTimeout(()=>playTone(60,.5,'sawtooth',.18),200)}
function sfxWin(){playTone(523,.15);setTimeout(()=>playTone(659,.15),100);setTimeout(()=>playTone(784,.2),200)}
function sfxLose(){playTone(400,.15);setTimeout(()=>playTone(300,.15),120);setTimeout(()=>playTone(200,.3),240)}
function sfxLevelUp(){playTone(440,.1);setTimeout(()=>playTone(554,.1),80);setTimeout(()=>playTone(659,.1),160);setTimeout(()=>playTone(880,.25),240)}

// ========== 题库 ==========
const ALL_Q=[
  {e:"🐔✈️🥚🔨",a:"鸡飞蛋打",h:"鸡__蛋_",d:1},{e:"🐴🐴🐯🐯",a:"马马虎虎",h:"马_虎_",d:1},
  {e:"🐮💨🌥️🐯",a:"牛气冲天",h:"牛_冲_",d:1},{e:"👀🖐️🔼🔽",a:"眼高手低",h:"眼_手_",d:1},
  {e:"🔪⛰️🔥🌊",a:"刀山火海",h:"刀_火_",d:1},{e:"🌸👍🌕⭕",a:"花好月圆",h:"花_月_",d:1},
  {e:"💭🐘🍅🏆",a:"心想事成",h:"心_事_",d:1},{e:"1️⃣🪨2️⃣🐦",a:"一石二鸟",h:"一_二_",d:1},
  {e:"🐉✈️🦚💃",a:"龙飞凤舞",h:"龙_凤_",d:2},{e:"🐢🐰🏃🏁",a:"龟兔赛跑",h:"龟_赛_",d:2},
  {e:"💧⬇️🪨🔩",a:"水滴石穿",h:"水_石_",d:2},{e:"🧲🐺🚪🏠",a:"引狼入室",h:"引_入_",d:2},
  {e:"🌬️☮️☀️🌺",a:"风和日丽",h:"风_日_",d:2},{e:"🐟💧😊👍",a:"如鱼得水",h:"如_得_",d:2},
  {e:"⛰️💚💧✨",a:"山清水秀",h:"山_水_",d:2},{e:"🐯👤🐍🍑",a:"虎头蛇尾",h:"虎_蛇_",d:3},
  {e:"🧥⭐👑🌙",a:"披星戴月",h:"披_戴_",d:3},{e:"🐒📅🐴🌙",a:"猴年马月",h:"猴_马_",d:3},
  {e:"👃🐔💃🕺",a:"闻鸡起舞",h:"闻_起_",d:3},{e:"🙈👋🐘",a:"盲人摸象",h:"盲_摸_",d:3},
  {e:"💨🌀🧹☁️",a:"风卷残云",h:"风_残_",d:2},{e:"🛡️🌳⏳🐰",a:"守株待兔",h:"守_待_",d:2},
  {e:"🍃👴❤️🐉",a:"叶公好龙",h:"叶_好_",d:3},{e:"🙉🔔🏃",a:"掩耳盗铃",h:"掩_盗_",d:2},
  {e:"🪞⚔️🛡️",a:"自相矛盾",h:"自_矛_",d:2},{e:"🦊🎭🐯💪",a:"狐假虎威",h:"狐_虎_",d:3},
  {e:"🐮🎹🎶",a:"对牛弹琴",h:"对_弹_",d:2},{e:"🥊🌿😱🐍",a:"打草惊蛇",h:"打_惊_",d:2},
  {e:"🕳️🐸⬇️",a:"井底之蛙",h:"井_之_",d:2},{e:"🥚💥🪨",a:"以卵击石",h:"以_击_",d:1},
  {e:"🧣⬆️➕🌸",a:"锦上添花",h:"锦_添_",d:2},{e:"💀🐑🔧🚪",a:"亡羊补牢",h:"亡_补_",d:2},
  {e:"👂💧👁️🎨",a:"耳濡目染",h:"耳_目_",d:3},{e:"🐯👄🦷🔧",a:"虎口拔牙",h:"虎_拔_",d:2},
  {e:"🌧️💨🤝🚣",a:"风雨同舟",h:"风_同_",d:3},{e:"❄️📦🔥",a:"雪中送炭",h:"雪_送_",d:2},
  {e:"🔥⬆️⛽",a:"火上浇油",h:"火_浇_",d:2},{e:"💔🪞🔄⭕",a:"破镜重圆",h:"破_重_",d:3},
  {e:"📖🌙⏰⏰",a:"凿壁偷光",h:"凿_偷_",d:3},{e:"😱🏹🦅🦅",a:"惊弓之鸟",h:"惊_之_",d:3},
  {e:"🐍🍷🐍🐍",a:"杯弓蛇影",h:"杯_蛇_",d:3},{e:"🐝🐝🐝🐝",a:"蜂拥而至",h:"蜂_而_",d:2},
  {e:"🌊🌊🌊🌊",a:"排山倒海",h:"排_倒_",d:2},{e:"🐉👁️🐉👁️",a:"画龙点睛",h:"画_点_",d:2},
  {e:"🎨🐍➕🦶",a:"画蛇添足",h:"画_添_",d:3},
];

// 去重
const seen=new Set();const QUESTIONS=ALL_Q.filter(q=>{if(seen.has(q.a))return false;seen.add(q.a);return true});

// ========== 怪物 ==========
const MONSTERS=[
  {name:"史莱姆",emoji:"🟢",hp:1,boss:false,bg:"grass"},{name:"哥布林",emoji:"👺",hp:1,boss:false,bg:"grass"},
  {name:"野狼",emoji:"🐺",hp:1,boss:false,bg:"grass"},{name:"毒蛇",emoji:"🐍",hp:1,boss:false,bg:"grass"},
  {name:"蝙蝠怪",emoji:"🦇",hp:1,boss:false,bg:"cave"},{name:"石像鬼",emoji:"🗿",hp:1,boss:false,bg:"cave"},
  {name:"蝎子精",emoji:"🦂",hp:1,boss:false,bg:"cave"},{name:"食人花",emoji:"🌺",hp:1,boss:false,bg:"grass"},
  {name:"骷髅兵",emoji:"💀",hp:1,boss:false,bg:"cave"},{name:"幽灵",emoji:"👻",hp:1,boss:false,bg:"castle"},
  {name:"火元素",emoji:"🔥",hp:1,boss:false,bg:"lava"},{name:"岩石怪",emoji:"🪨",hp:1,boss:false,bg:"cave"},
  {name:"鹰身女妖",emoji:"🦅",hp:1,boss:false,bg:"grass"},{name:"鳄鱼怪",emoji:"🐊",hp:1,boss:false,bg:"grass"},
  {name:"暗影刺客",emoji:"🥷",hp:1,boss:false,bg:"castle"},
];
const BOSSES=[
  {name:"🐉 巨龙",emoji:"🐉",hp:3,boss:true,bg:"cave"},
  {name:"🔥 炎魔",emoji:"👹",hp:3,boss:true,bg:"lava"},
  {name:"💀 亡灵王",emoji:"💀",emoji2:"👑",hp:4,boss:true,bg:"castle"},
  {name:"🦖 霸王龙",emoji:"🦖",hp:4,boss:true,bg:"grass"},
  {name:"👹 恶魔领主",emoji:"😈",hp:5,boss:true,bg:"lava"},
  {name:"👑 暗影之王",emoji:"👑",hp:6,boss:true,bg:"castle"},
];

// ========== 游戏状态 ==========
let playerName='',level=1,score=0,maxHp=5,playerHp=5,tipsLeft=3;
let currentQ=null,currentMonster=null,monsterHp=0,monsterMaxHp=0,answered=false;
let usedQuestions=[],currentDifficulty=1;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function getMonster(lv){
  // Boss every 5 levels
  if(lv%5===0){
    const bi=(lv/5-1)%BOSSES.length;
    return {...BOSSES[bi]};
  }
  // Normal monster
  const mi=(lv-1-Math.floor((lv-1)/5))%MONSTERS.length;
  return {...MONSTERS[mi]};
}

function getQuestion(){
  const pool=QUESTIONS.filter(q=>q.d<=currentDifficulty&&!usedQuestions.includes(q.a));
  if(pool.length===0){usedQuestions=[];return getQuestion()}
  return pool[Math.floor(Math.random()*pool.length)];
}

function initLevel(){
  answered=false;
  currentMonster=getMonster(level);
  monsterMaxHp=currentMonster.hp;
  monsterHp=currentMonster.hp;
  currentQ=getQuestion();
  updateBattleScene();
  updateGameUI();
  
  // Show level banner
  const banner=document.getElementById('levelBanner');
  const isBoss=currentMonster.boss;
  banner.innerHTML=isBoss?`⚠️ BOSS战！<br>${currentMonster.name}`:`第 ${level} 关<br>${currentMonster.name} 出现了！`;
  banner.className='level-banner show';
  if(isBoss)sfxBoss();
  setTimeout(()=>banner.className='level-banner',1500);
}

function updateBattleScene(){
  const m=document.getElementById('monster');
  m.querySelector('#monsterSprite').textContent=currentMonster.emoji+(currentMonster.emoji2||'');
  m.querySelector('#monsterName').textContent=currentMonster.name;
  m.querySelector('#monsterHpBar').style.width=(monsterHp/monsterMaxHp*100)+'%';
  m.className='monster';
  
  document.getElementById('playerHpBar').style.width=(playerHp/maxHp*100)+'%';
  document.getElementById('playerName').textContent=playerName||'勇者';
  
  const bg=document.getElementById('sceneBg');
  bg.className='scene-bg '+(currentMonster.bg||'grass');
}

function updateGameUI(){
  document.getElementById('levelText').textContent=`第 ${level} 关`;
  document.getElementById('scoreText').textContent=score+'分';
  const bossTag=document.getElementById('bossTag');
  bossTag.style.display=currentMonster.boss?'inline-block':'none';
  document.getElementById('emojiDisplay').textContent=currentQ.e;
  document.getElementById('hintDisplay').textContent='';
  document.getElementById('tipBtn').disabled=tipsLeft<=0;
  
  // Options
  const wrongs=shuffle(QUESTIONS.filter(q=>q.a!==currentQ.a)).slice(0,3).map(q=>q.a);
  const opts=shuffle([currentQ.a,...wrongs]);
  document.getElementById('options').innerHTML=opts.map(a=>
    `<button class="option-btn" onclick="answer('${a}')">${a}</button>`).join('');
}

function answer(choice){
  if(answered)return;
  answered=true;
  initAudio();
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>{
    if(b.textContent===currentQ.a)b.classList.add('correct');
    else if(b.textContent===choice)b.classList.add('wrong');
    b.style.pointerEvents='none';
  });
  
  if(choice===currentQ.a){
    // Correct - Attack!
    sfxAttack();
    document.getElementById('playerEl').classList.add('attack');
    setTimeout(()=>document.getElementById('playerEl').classList.remove('attack'),400);
    
    // Damage monster
    monsterHp--;
    score+=currentMonster.boss?20:10;
    document.getElementById('monster').classList.add('hit');
    setTimeout(()=>{document.getElementById('monster').classList.remove('hit');},300);
    spawnDmgNum();
    updateBattleScene();
    updateGameUI();
    
    if(monsterHp<=0){
      // Monster defeated
      sfxWin();
      document.getElementById('monster').classList.add('defeated');
      usedQuestions.push(currentQ.a);
      if(currentDifficulty<3&&level%3===0)currentDifficulty++;
      setTimeout(()=>{
        level++;
        if(level%5===1&&level>1){playerHp=Math.min(maxHp,playerHp+1)} // heal after boss
        initLevel();
      },800);
    }else{
      // Boss still alive - new question
      usedQuestions.push(currentQ.a);
      setTimeout(()=>{
        currentQ=getQuestion();
        answered=false;
        updateGameUI();
      },600);
    }
  }else{
    // Wrong - Monster attacks!
    sfxHit();
    document.getElementById('playerEl').classList.add('hit');
    setTimeout(()=>document.getElementById('playerEl').classList.remove('hit'),300);
    playerHp--;
    updateBattleScene();
    
    if(playerHp<=0){
      gameOver();
    }else{
      // New question
      setTimeout(()=>{
        currentQ=getQuestion();
        answered=false;
        updateGameUI();
      },600);
    }
  }
}

function spawnDmgNum(){
  const el=document.createElement('div');
  el.className='dmg-num';
  el.textContent='-'+monsterMaxHp/monsterMaxHp;
  const scene=document.getElementById('battleScene');
  const rect=scene.getBoundingClientRect();
  el.style.left=(rect.width*.65)+'px';
  el.style.top=(rect.height*.35)+'px';
  scene.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

function useTip(){
  if(answered||tipsLeft<=0)return;
  tipsLeft--;score=Math.max(0,score-5);
  document.getElementById('hintDisplay').textContent='提示：'+(currentQ.h||(currentQ.a[0]+'__'+currentQ.a[3]));
  updateGameUI();
}

function skipQuestion(){
  if(answered)return;
  sfxHit();
  answered=true;
  playerHp--;
  updateBattleScene();
  if(playerHp<=0){gameOver();return}
  setTimeout(()=>{
    currentQ=getQuestion();
    answered=false;
    updateGameUI();
  },400);
}

function gameOver(){
  sfxLose();
  document.getElementById('gameUi').style.display='none';
  saveRank();
  showResult();
}

function saveRank(){
  const key='emoji_adventure_ranks';
  let ranks=JSON.parse(localStorage.getItem(key)||'[]');
  ranks.push({name:playerName||'无名勇者',level,score,date:new Date().toLocaleDateString()});
  ranks.sort((a,b)=>b.level-a.level||b.score-a.score);
  ranks=ranks.slice(0,20);
  localStorage.setItem(key,JSON.stringify(ranks));
}

function showResult(){
  const key='emoji_adventure_ranks';
  const ranks=JSON.parse(localStorage.getItem(key)||'[]');
  const myRank=ranks.findIndex(r=>r.name===playerName&&r.level===level&&r.score===score)+1;
  
  const emoji=level>=30?'👑':level>=20?'🏆':level>=10?'⚔️':level>=5?'🛡️':'💔';
  const title=level>=30?'传说勇者！':level>=20?'屠龙高手！':level>=10?'冒险大师':level>=5?'初出茅庐':'冒险结束';
  
  let rankHtml='<table class="rank-table"><tr><th>排名</th><th>勇者</th><th>关卡</th><th>分数</th></tr>';
  ranks.slice(0,8).forEach((r,i)=>{
    const cls=i===myRank-1?'me':'';
    const numCls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const num=i===0?'👑':i===1?'🥈':i===2?'🥉':(i+1);
    rankHtml+=`<tr class="${cls}"><td class="rank-num ${numCls}">${num}</td><td>${r.name}</td><td>${r.level}关</td><td>${r.score}分</td></tr>`;
  });
  rankHtml+='</table>';
  
  document.getElementById('resultCard').innerHTML=`
    <div class="end-emoji">${emoji}</div>
    <h2>${title}</h2>
    <div class="final-score">${score}分</div>
    <div class="detail">勇者 <span>${playerName||'无名'}</span> · 到达 <span>第${level}关</span> · 排名 <span>#${myRank||'?'}</span></div>
    ${rankHtml}
    <div class="btns">
      <button class="share-btn" onclick="shareResult()">📤 分享战绩</button>
      <button class="restart-btn" onclick="restartGame()">🔄 再来一局</button>
    </div>`;
  document.getElementById('resultOverlay').classList.add('show');
}

function shareResult(){
  const text=`⚔️ Emoji成语大冒险\n我「${playerName}」闯到第${level}关，得分${score}！\n你也来挑战吧！`;
  if(navigator.share){navigator.share({title:'Emoji成语大冒险',text})}
  else{navigator.clipboard.writeText(text).then(()=>alert('已复制，去分享吧！'))}
}

function startGame(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name){document.getElementById('nameInput').focus();return}
  playerName=name;
  level=1;score=0;playerHp=maxHp;tipsLeft=3;usedQuestions=[];currentDifficulty=1;
  initAudio();
  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameUi').style.display='block';
  document.getElementById('resultOverlay').classList.remove('show');
  initLevel();
}

function restartGame(){
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('startScreen').style.display='flex';
  document.getElementById('gameUi').style.display='none';
}

// 预加载排行榜预览
(function(){
  const key='emoji_adventure_ranks';
  const ranks=JSON.parse(localStorage.getItem(key)||'[]');
  if(ranks.length>0){
    document.getElementById('rankPreview').textContent=`🏆 历史最高：${ranks[0].name} 到达第${ranks[0].level}关`;
  }
})();
</script>
</body>
</html>
